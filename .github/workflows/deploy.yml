name: Deploy React PWA to GitHub Pages

on:
  # Trigger the workflow on push to main branch
  push:
    branches:
      - main
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4

      - name: Build Application
        # FIX: Appending the base path flag ensures Vite links assets correctly for GitHub Pages.
        # We use the base_path output from the Setup Pages step above.
        run: npm run build -- --base=${{ steps.pages.outputs.base_path }}/

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository 'dist' folder
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
