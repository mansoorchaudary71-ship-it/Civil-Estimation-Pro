<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- PWA Manifest & Theme Color -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#2980b9" />
    <link rel="apple-touch-icon" href="/icon-192x192.png" />
    
    <!-- SEO Metadata -->
    <meta name="description" content="Civil Estimation Pro: Advanced estimators for live construction rate analysis, house estimating, and comprehensive BOQ calculators." />
    <meta name="keywords" content="civil engineering, live construction rate analysis, estimating software, BOQ, construction cost calculator, material estimator" />
    <meta name="author" content="Civil Estimation Pro" />
    <meta name="robots" content="index, follow" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://civilestimationpro.com/" />
    <meta property="og:title" content="Civil Estimation Pro | Advanced Construction Estimator" />
    <meta property="og:description" content="Calculate accurate construction costs, material estimates, and real-time market rates instantly with Civil Estimation Pro." />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://civilestimationpro.com/" />
    <meta property="twitter:title" content="Civil Estimation Pro | Advanced Construction Estimator" />
    <meta property="twitter:description" content="Calculate accurate construction costs, material estimates, and real-time market rates instantly with Civil Estimation Pro." />
    
    <title>Civil Estimation Pro</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Register Service Worker for PWA
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(registration => {
            console.log('SW registered: ', registration);
          }).catch(registrationError => {
            console.log('SW registration failed: ', registrationError);
          });
        });
      }
    </script>
  </body>
</html>
